<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mandalorian</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #060608; color: #ccc; min-height: 100vh; }

        .header { background: #0a0a0f; border-bottom: 1px solid #1a1a2e; padding: 2.5rem 1.5rem; text-align: center; }
        .header h1 { font-size: 32px; font-weight: 600; color: #e8c97a; letter-spacing: 4px; }
        .header p { font-size: 13px; color: #555; margin-top: 6px; letter-spacing: 1px; }

        .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

        .legend { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-ok   { background: #0f3d20; color: #4ade80; border: 1px solid #166534; }
        .badge-warn { background: #3d2f00; color: #fbbf24; border: 1px solid #854d0e; }
        .badge-err  { background: #3d0f0f; color: #f87171; border: 1px solid #991b1b; }

        .season { margin-bottom: 2rem; background: #0d0d17; border: 1px solid #1a1a30; border-radius: 12px; overflow: hidden; }
        .season-header { padding: 1rem 1.25rem; border-bottom: 1px solid #1a1a30; display: flex; align-items: center; gap: 10px; }
        .season-dot { width: 8px; height: 8px; border-radius: 50%; background: #e8c97a; }
        .season-header span { font-size: 12px; font-weight: 600; color: #e8c97a; letter-spacing: 2px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 8px 16px; text-align: left; color: #444; font-weight: 600; font-size: 11px; letter-spacing: 1px; border-bottom: 1px solid #1a1a2e; }
        td { padding: 11px 16px; border-bottom: 1px solid #111; color: #bbb; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #12121f; }

        .id-col { color: #e8c97a; font-family: monospace; font-size: 12px; }

        .btn-alq  { background: transparent; border: 1px solid #e8c97a; color: #e8c97a; padding: 5px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .btn-alq:hover { background: #e8c97a22; }
        .btn-conf { background: transparent; border: 1px solid #4ade80; color: #4ade80; padding: 5px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .btn-conf:hover { background: #4ade8022; }
        .no-act { color: #333; font-size: 11px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #0d0d17; border: 1px solid #e8c97a44; border-radius: 14px; padding: 2rem; width: 100%; max-width: 420px; }
        .modal h3 { color: #e8c97a; font-size: 16px; font-weight: 500; margin-bottom: 0.5rem; }
        .modal p { color: #666; font-size: 13px; margin-bottom: 1.5rem; }
        .modal label { font-size: 12px; color: #777; display: block; margin-bottom: 6px; letter-spacing: 1px; }
        .modal input { width: 100%; background: #060608; border: 1px solid #1a1a30; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; }
        .modal input:focus { border-color: #e8c97a66; }
        .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }
        .btn-cancel  { background: transparent; border: 1px solid #333; color: #666; padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .btn-confirm { background: #e8c97a; border: none; color: #000; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-confirm:hover { background: #f0d68a; }

        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #0d0d17; border: 1px solid #1a1a30; border-radius: 10px; padding: 1rem 1.5rem; font-size: 13px; color: #ccc; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 320px; }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #166534; color: #4ade80; }
        .toast.error   { border-color: #991b1b; color: #f87171; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE MANDALORIAN</h1>
        <p>SISTEMA DE ALQUILER DE CAPÍTULOS</p>
    </div>

    <div class="container">
        <div class="legend">
            <span class="badge badge-ok">Disponible</span>
            <span class="badge badge-warn">Reservado</span>
            <span class="badge badge-err">Alquilado</span>
        </div>
        <div id="contenido"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>Confirmar Pago</h3>
            <p id="modal-titulo"></p>
            <label>PRECIO DEL ALQUILER ($)</label>
            <input type="number" id="input-precio" placeholder="Ej: 299" min="1">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirm" onclick="confirmarPago()">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let capituloSeleccionado = null;

        function badgeEstado(estado) {
            const map = {
                'disponible': '<span class="badge badge-ok">Disponible</span>',
                'alquilado':  '<span class="badge badge-err">Alquilado</span>',
                'reservado':  '<span class="badge badge-warn">Reservado</span>'
            };
            return map[estado] || '-';
        }

        function botonAccion(cap) {
            if (cap.estado === 'disponible') {
                return `<button class="btn-alq" onclick="alquilar('${cap.id}')">Alquilar</button>`;
            } else if (cap.estado === 'reservado') {
                return `<button class="btn-conf" onclick="abrirModal('${cap.id}', '${cap.titulo}')">Confirmar Pago</button>`;
            }
            return '<span class="no-act">No disponible</span>';
        }

        function mostrarToast(msg, tipo = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${tipo} show`;
            setTimeout(() => t.className = 'toast', 3000);
        }

        async function cargarCapitulos() {
            const res = await fetch('/api/capitulos/');
            const capitulos = await res.json();

            const temporadas = [
                { label: 'TEMPORADA 1', prefix: 'S01' },
                { label: 'TEMPORADA 2', prefix: 'S02' },
                { label: 'TEMPORADA 3', prefix: 'S03' },
            ];

            let html = '';
            for (const temp of temporadas) {
                const caps = capitulos.filter(c => c.id.startsWith(temp.prefix));
                const filas = caps.map(c => `
                    <tr>
                        <td class="id-col">${c.id}</td>
                        <td>${c.titulo}</td>
                        <td>${badgeEstado(c.estado)}</td>
                        <td>${botonAccion(c)}</td>
                    </tr>
                `).join('');

                html += `
                    <div class="season">
                        <div class="season-header">
                            <div class="season-dot"></div>
                            <span>${temp.label}</span>
                        </div>
                        <table>
                            <thead>
                                <tr><th>ID</th><th>TÍTULO</th><th>ESTADO</th><th>ACCIÓN</th></tr>
                            </thead>
                            <tbody>${filas}</tbody>
                        </table>
                    </div>
                `;
            }
            document.getElementById('contenido').innerHTML = html;
        }

        async function alquilar(id) {
            const res = await fetch(`/api/capitulos/${id}/alquilar`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                mostrarToast(`${id} reservado — tenés 4 min para confirmar el pago`, 'success');
            } else {
                mostrarToast(data.error, 'error');
            }
            cargarCapitulos();
        }

        function abrirModal(id, titulo) {
            capituloSeleccionado = id;
            document.getElementById('modal-titulo').textContent = titulo;
            document.getElementById('input-precio').value = '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function confirmarPago() {
            const precio = document.getElementById('input-precio').value;
            if (!precio || precio <= 0) {
                mostrarToast('Ingresá un precio válido', 'error');
                return;
            }
            const res = await fetch(`/api/capitulos/${capituloSeleccionado}/confirmar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ precio: parseFloat(precio) })
            });
            const data = await res.json();
            cerrarModal();
            if (res.ok) {
                mostrarToast(`Pago confirmado — ${capituloSeleccionado} alquilado por 24hs`, 'success');
            } else {
                mostrarToast(data.error, 'error');
            }
            cargarCapitulos();
        }

        cargarCapitulos();
    </script>
</body>
</html>
